name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race -count=1 ./...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

  drift-check:
    name: Config Struct Drift Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout atlax-tools
        uses: actions/checkout@v4
        with:
          path: atlax-tools

      - name: Checkout atlax community
        uses: actions/checkout@v4
        with:
          repository: atlasshare/atlax
          path: atlax

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: atlax-tools/go.mod
          cache: true
          cache-dependency-path: atlax-tools/go.sum

      - name: Run drift check
        working-directory: atlax-tools
        run: go run ./cmd/driftcheck --community-path ../atlax/pkg/config/config.go
